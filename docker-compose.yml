version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./demo
    container_name: logistics-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/logisticsDB
    depends_on:
      - mongodb

  frontend:
    build: .
    container_name: logistics-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
